name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref so pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # No submodule fetch: build.rs degrades gracefully when lib/zgui-core is
      # absent (empty web bundles), and no test touches the served dashboard —
      # keeps CI free of any tap-token / private-submodule dependency, matching
      # release.yml which also builds without the submodule.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Doc tests
        run: cargo test --workspace --locked --doc
      - name: In-language self-tests (arb --test on every stdlib preset)
        shell: bash
        run: |
          # Dogfood the real CLI: every bundled preset ships `test { … }` blocks;
          # run them through the actual `arb --test` and fail CI on any failure or
          # a preset that carries no tests. Complements the Rust
          # `every_stdlib_preset_carries_passing_self_tests` (which drives
          # testrun::run directly) by exercising the binary + flag + exit code.
          # Build the `arb` bin here so the step is self-contained (a no-op after
          # the Build step above); it lands at target/debug/arb — no install.
          cargo build --bin arb --locked
          arb=target/debug/arb
          test -x "$arb" || { echo "::error::arb binary not found at $arb"; exit 1; }
          fail=0
          count=0
          for f in stdlib/*.arb; do
            if ! out=$("$arb" --test "$f" 2>&1); then
              echo "::error file=$f::self-tests failed"; echo "$out"; fail=1
            elif printf '%s\n' "$out" | grep -q '^1\.\.0$'; then
              echo "::error file=$f::no test { } blocks"; fail=1
            fi
            count=$((count + 1))
          done
          echo "ran arb --test on $count stdlib presets"
          exit $fail
